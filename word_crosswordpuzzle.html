<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>십자말풀이 게임</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F9FC;
            color: #333;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }

        /* ------------------ 십자말풀이 그리드 ------------------ */
        .grid-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 0 auto 24px;
            max-width: 1200px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(15, minmax(0, 40px));
            grid-template-rows: repeat(15, minmax(0, 40px));
            gap: 1px;
            background: #D1D5DB;
            padding: 2px;
            border-radius: 6px;
        }
        .cell {
            width: 40px;
            height: 40px;
            background: #fff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s; /* 채점 애니메이션 추가 */
        }
        .cell.blocked { 
            background: #E5E7EB; 
            cursor: default;
        }
        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 1.125rem;
            font-weight: bold;
            background: transparent;
            text-transform: uppercase;
        }
        .cell input:focus {
            outline: 3px solid #6366F1;
            z-index: 10;
        }
        .number {
            position: absolute;
            top: 1px;
            left: 3px;
            font-size: 0.6rem;
            color: #4B5563;
            pointer-events: none;
            line-height: 1;
        }
        
        /* ------------------ 유저 드롭다운 ------------------ */
        .user-menu {
            position: relative;
            display: inline-block;
        }
        .user-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            transform: translateY(8px);
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 160px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, .1);
            z-index: 100;
        }
        .user-dropdown a {
            display: block;
            padding: 8px 12px;
            font-size: 14px;
            color: #333;
            text-decoration: none;
        }
        .user-dropdown a:hover {
            background: #f0f0f0;
        }
        .user-menu:hover .user-dropdown {
            display: block;
        }


        /* --- 단어장 카드 수정 --- */
        .wordbook-card {
        background:#fff; border-radius: 12px; padding: 1.25rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        transition: transform .2s, box-shadow .2s; cursor: pointer;
        }
        .wordbook-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        
        
        .clues h3 {
            border-bottom: 2px solid #D1D5DB;
            padding-bottom: 4px;
            margin-top: 1rem;
            font-weight: 700;
            color: #1F2937;
        }
        .clues ul { padding-left: 1.5rem; }
        .clues li { margin: 0.5rem 0; font-size: 0.875rem; line-height: 1.4; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="bg-white shadow-md py-4">
        <nav class="container flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a onclick="location.href='home.html'" class="text-gray-800 text-lg font-bold hover:text-blue-600">홈</a>
                <a onclick="location.href='word_main.html'" class="text-gray-800 text-lg font-bold hover:text-blue-600">어휘 학습</a>
                <a onclick="location.href='word_tool_main.html'" class="text-blue-600 text-lg font-bold">학습 도구</a>
                <a onclick="location.href='word_dashboard.html'" class="text-gray-800 text-lg font-bold hover:text-blue-600">사용자</a>
            </div>
            <div id="authContainer" class="flex items-center space-x-4"></div>
        </nav>
    </header>

<main class="container">
    <section id="select-mode" class="flex flex-col items-center w-full">
      <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">십자말풀이</h1>
      <div id="quiz-wordbook-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">
        <div id="loading-message" class="text-center text-gray-500 mt-12">단어장 불러오는 중...</div>
      </div>
    </section>

        <section id="crossword-study-section" class="hidden">
            <div class="flex justify-between items-center max-w-2xl mx-auto mb-6">
                <a href="word_crosswordpuzzle.html" onclick="showCrosswordList(); return false;" class="text-gray-500 hover:text-blue-600 transition">
                    <i class="fas fa-arrow-left mr-2"></i>목록으로
                </a>
                <button id="refreshBtn" class="px-4 py-2 rounded-full bg-white text-gray-800 text-sm font-semibold border border-gray-300 hover:bg-gray-100 transition">
                    <i class="fas fa-sync-alt mr-1"></i>단어장 새로고침
                </button>
            </div>
            <h1 id="crossword-study-title" class="text-3xl font-bold text-gray-900 mb-8 text-center"></h1>
            <div class="grid-container">
                <div id="grid" class="grid" aria-label="퍼즐 그리드"></div>
                <div class="clues w-[300px] lg:w-[400px] max-h-[650px] overflow-auto p-4 bg-white rounded-lg shadow-md">
                    <h3 class="text-xl">가로 문제</h3>
                    <ul id="acrossClues"></ul>
                    <h3 class="text-xl">세로 문제</h3>
                    <ul id="downClues"></ul>
                </div>
            </div>
            <div class="max-w-md mx-auto mt-6">
                <button class="w-full py-3 bg-blue-600 text-white text-lg font-semibold rounded-lg shadow-md hover:bg-blue-700 transition" id="checkBtn">
                    정답 확인 / 채점
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, signOut, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";

        /* ---------- Firebase Config & Init ---------- */
        const firebaseConfig = {
            apiKey: "AIzaSyBXc7qF3lz2dbWOu1O3ftSNu8dye1RLk3E",
            authDomain: "auto-dictionary-29936.firebaseapp.com",
            projectId: "auto-dictionary-29936",
            storageBucket: "auto-dictionary-29936.appspot.com",
            messagingSenderId: "103494421267",
            appId: "1:103494421267:web:6762683fac5ac130e468e6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        /* ---------- Constants & DOM Elements ---------- */
        const SIZE = 15;
        const MAX_WORDS = 30;
        const crosswordListSection = document.getElementById('crossword-list-section');
        const crosswordStudySection = document.getElementById('crossword-study-section');
        const wordbookListContainer = document.getElementById('quiz-wordbook-list'); // 수정: ID를 quiz-wordbook-list로 사용
        const crosswordStudyTitle = document.getElementById('crossword-study-title');
        const authContainer = document.getElementById('authContainer');
        const gridEl = document.getElementById('grid');
        const acrossCluesEl = document.getElementById('acrossClues');
        const downCluesEl = document.getElementById('downClues');
        const refreshBtn = document.getElementById('refreshBtn');
        const checkBtn = document.getElementById('checkBtn');
        const loadingMsg = document.getElementById('loading-message'); // 추가: 로딩 메시지 요소

        /* ---------- State Variables ---------- */
        let puzzleGrid = [];
        let placedWords = [];
        let authUser = null;
        let cleanedEmail = null; // 클리닝된 이메일 ID 저장
        let allWordbooksData = {}; // { id: { words: [...], progress: 0, totalCells: 0, correctCells: 0 } }
        let currentWordbookId = null;

        /* ---------- Utilities (플래시카드 코드 통합) ---------- */
        const cleanEmailForDocId = email => email.replace(/\./g, '_dot_'); // 💡 이메일 클리닝 함수
        const toArr = v => Array.isArray(v) ? v.filter(Boolean) : 
            (v ? String(v).split(/[;,/·]/).map(s=>s.trim()).filter(Boolean) : []); // 💡 toArr 유틸리티
        const asText = v => Array.isArray(v) ? v.join(', ') : (v || '-'); // 💡 asText 유틸리티
        const dateId = ()=> new Date().toISOString().slice(0,10); // 💡 dateId 유틸리티


        /* ---------- UI Functions ---------- */
        function showSection(section) {
            document.getElementById('select-mode').classList.add('hidden'); // 추가: 목록 섹션 숨김 처리
            crosswordStudySection.classList.add('hidden');
            section.classList.remove('hidden');
        }
        function showCrosswordList() { 
            // 목록으로 돌아갈 때 데이터 리로드
            if(authUser) populateWordbookList(authUser);
            showSection(document.getElementById('select-mode')); // 수정: select-mode 섹션 표시
        }
        
        // 단어장 렌더링
        function renderWordbookCard(type, id, words) {
            const div = document.createElement('div');
            div.className = 'wordbook-card';
            
            // 수정
            div.innerHTML = `<div class="flex items-center mb-2">
                <i class="fa-solid ${type==='dates'?'fa-calendar-days':'fa-user'} text-blue-600 mr-5"></i>
                <h3 class="text-lg font-bold">${id}</h3>
            </div>
            <p class="text-gray-600 text-sm">총 ${words.length}개 단어</p>`;
            
            div.addEventListener('click', () => loadSelectedDate(id));
            wordbookListContainer.appendChild(div);
        }
        
        function renderAuthUI(user) {
            authContainer.innerHTML = '';
            if (user) {
                const name = user.displayName || user.email || '사용자';
                const photo = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/847/847969.png';

                authContainer.innerHTML = `
                    <div class="user-menu">
                        <a href="#" class="flex items-center space-x-2">
                            <span class="font-semibold">${name}</span>
                            <img src="${photo}" class="w-7 h-7 rounded-full object-cover">
                        </a>
                        <div class="user-dropdown">
                            <a href="#">${user.email || ''}</a>
                            <a href="#" id="logoutBtn" class="text-red-500 font-semibold">로그아웃</a>
                        </div>
                    </div>
                `;
                document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    signOut(auth);
                });
            } else {
                authContainer.innerHTML = `
                    <button id="loginBtn" class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-semibold">
                        로그인
                    </button>`;
                document.getElementById('loginBtn')?.addEventListener('click', () => signInWithPopup(auth, provider));
            }
        }

        /* ---------- Firebase Logic ---------- */
        onAuthStateChanged(auth, async (user) => {
            authUser = user;
            renderAuthUI(user);
            if (user) {
                cleanedEmail = cleanEmailForDocId(user.email); 
                await populateWordbookList(user);
            } else {
                wordbookListContainer.innerHTML = `
                    <p class="text-center col-span-full text-lg text-gray-500 py-10">
                        단어장을 확인하려면 로그인해주세요.
                    </p>
                `;
            }
        });

        // getWordbooksFromSnap 통합 및 cleanedEmail 적용
        async function getWordbooksFromSnap(snapshot, type, cleanedEmail) {
            const result = [];
            for (const docSnap of snapshot.docs) {
                const wordbookId = docSnap.id;
                const searchSnap = await getDocs(collection(db, "users", cleanedEmail, type, wordbookId, "searchHistory"));
                const words = [];
                searchSnap.forEach(item => {
                    const d = item.data();
                    // 단어와 의미가 존재하고, 영어 알파벳으로 이루어진 단어만 필터링 (십자말풀이에 적합하게)
                    if (d.word && d.word.match(/^[a-zA-Z]+$/) && toArr(d.meaning || d.meanings).length > 0) {
                        words.push({
                            word: String(d.word).toUpperCase(),
                            clue: toArr(d.meaning || d.meanings)[0]
                        });
                    }
                });
                if (words.length > 0) {
                    // allWordbooksData에 초기화/업데이트
                    allWordbooksData[`${wordbookId}`] = allWordbooksData[`${wordbookId}`] || { progress: 0, totalCells: 0, correctCells: 0 };
                    allWordbooksData[`${wordbookId}`].words = words;
                    result.push({ type, id: wordbookId, words });
                }
            }
            return result;
        }


        //  단어장 목록 불러오기
        async function populateWordbookList(user) {
            if (!cleanedEmail) return;

            loadingMsg.classList.remove('hidden'); // 로딩 메시지 보이기
            wordbookListContainer.innerHTML = '';
            
            allWordbooksData = {};
            // 💡 cleanedEmail 적용
            const datesSnap = await getDocs(collection(db, "users", cleanedEmail, "dates")); 
            const customSnap = await getDocs(collection(db, "users", cleanedEmail, "custom")); 

            const allWordbooks = [
                // 💡 cleanedEmail 적용
                ...(await getWordbooksFromSnap(datesSnap, "dates", cleanedEmail)),
                ...(await getWordbooksFromSnap(customSnap, "custom", cleanedEmail)),
            ].sort((a, b) => a.id.localeCompare(b.id));

            loadingMsg.classList.add('hidden'); // 로딩 메시지 숨기기

            if (allWordbooks.length === 0) {
                wordbookListContainer.innerHTML = `<p class="text-center col-span-full text-gray-500 mt-4">십자말풀이로 만들 수 있는 단어장 기록이 없습니다.</p>`;
                return;
            }

            allWordbooks.forEach(({ type, id, words }) => renderWordbookCard(type, id, words));
        }
        

        /* ---------- Crossword Puzzle Logic (Core) ---------- */

        // 🧩 퍼즐 생성 및 화면 전환
        async function loadSelectedDate(wordbookId) {
            if (!authUser) return alert('로그인 후 사용하세요.');
            if (!allWordbooksData[wordbookId]) {
                alert('단어장 데이터를 찾을 수 없습니다.');
                return;
            }
            const list = allWordbooksData[wordbookId].words;
            currentWordbookId = wordbookId;
            if (!list || list.length === 0) return alert('선택한 단어장에 유효한 단어가 없습니다.');

            placedWords = [];
            puzzleGrid = Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, () => null));

            // 단어를 길이가 긴 순으로 정렬하여 교차 확률 증가
            const sortedList = list.slice().sort((a, b) => b.word.length - a.word.length);

            let idx = 1;
            for (const item of sortedList.slice(0, MAX_WORDS)) {
                if (item.word.length > SIZE) continue;
                const placed = placeWord(item, idx);
                if (!placed) forcePlaceWord(item, idx);
                idx++;
            }

            let totalCells = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (puzzleGrid[r][c] && puzzleGrid[r][c].letter) totalCells++;
                }
            }
            allWordbooksData[wordbookId].totalCells = totalCells;

            crosswordStudyTitle.textContent = `${wordbookId} 십자말풀이`;
            createGrid();
            renderClues();
            showSection(crosswordStudySection);
        }
        
        // 🧮 단어 배치 함수 (이전 로직 유지)
        function canPlace(word, row, col, dir) {
            const dr = dir === 'down' ? 1 : 0;
            const dc = dir === 'across' ? 1 : 0;

            for (let k = 0; k < word.length; k++) {
                const r = row + dr * k;
                const c = col + dc * k;
                if (r < 0 || c < 0 || r >= SIZE || c >= SIZE) return false;
                const cellData = puzzleGrid[r][c];
                if (cellData && cellData.letter && cellData.letter !== word[k]) return false;
                
                if (!cellData || !cellData.letter || cellData.letter !== word[k]) {
                    if (dir === 'across') {
                        if (r > 0 && puzzleGrid[r - 1][c] && puzzleGrid[r - 1][c].letter) return false;
                        if (r < SIZE - 1 && puzzleGrid[r + 1][c] && puzzleGrid[r + 1][c].letter) return false;
                        if (k === 0 && c > 0 && puzzleGrid[r][c - 1] && puzzleGrid[r][c - 1].letter) return false;
                        if (k === word.length - 1 && c < SIZE - 1 && puzzleGrid[r][c + 1] && puzzleGrid[r][c + 1].letter) return false;
                    } 
                    else { // dir === 'down'
                        if (c > 0 && puzzleGrid[r][c - 1] && puzzleGrid[r][c - 1].letter) return false;
                        if (c < SIZE - 1 && puzzleGrid[r][c + 1] && puzzleGrid[r][c + 1].letter) return false;
                        if (k === 0 && r > 0 && puzzleGrid[r - 1][c] && puzzleGrid[r - 1][c].letter) return false;
                        if (k === word.length - 1 && r < SIZE - 1 && puzzleGrid[r + 1][c] && puzzleGrid[r + 1][c].letter) return false;
                    }
                }
            }
            return true;
        }

        function applyPlacement(word, row, col, dir, num) {
            const dr = dir === 'down' ? 1 : 0;
            const dc = dir === 'across' ? 1 : 0;
            for (let k = 0; k < word.length; k++) {
                const r = row + dr * k;
                const c = col + dc * k;
                puzzleGrid[r][c] = puzzleGrid[r][c] || { letter: '', number: null };
                puzzleGrid[r][c].letter = word[k];
                if (k === 0 && puzzleGrid[r][c].number === null) puzzleGrid[r][c].number = num;
            }
        }

        function placeWord(item, num) {
            const word = item.word;
            if (placedWords.length === 0) {
                const row = Math.floor(SIZE / 2);
                const startCol = Math.floor((SIZE - word.length) / 2);
                if (canPlace(word, row, startCol, 'across')) {
                    applyPlacement(word, row, startCol, 'across', num);
                    placedWords.push({ ...item, row, col: startCol, dir: 'across', num });
                    return true;
                }
            }
            for (const existing of placedWords) {
                if (existing.tried) continue; 
                for (let i = 0; i < word.length; i++) {
                    for (let j = 0; j < existing.word.length; j++) {
                        if (word[i] === existing.word[j]) {
                            let row, col, dir;
                            if (existing.dir === 'across') {
                                row = existing.row - i;
                                col = existing.col + j;
                                dir = 'down';
                            } else {
                                row = existing.row + j;
                                col = existing.col - i;
                                dir = 'across';
                            }
                            if (canPlace(word, row, col, dir)) {
                                applyPlacement(word, row, col, dir, num);
                                placedWords.push({ ...item, row, col, dir, num });
                                existing.tried = true; 
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        function forcePlaceWord(item, num) {
            const word = item.word;
            let attempts = 0;
            while (attempts < 100) {
                const dir = Math.random() < 0.5 ? 'across' : 'down';
                const row = Math.floor(Math.random() * SIZE);
                const col = Math.floor(Math.random() * SIZE);
                if (canPlace(word, row, col, dir)) {
                    applyPlacement(word, row, col, dir, num);
                    placedWords.push({ ...item, row, col, dir, num });
                    return true;
                }
                attempts++;
            }
            return false;
        }

        function createGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (!puzzleGrid[r][c]) {
                        cell.classList.add('blocked');
                    } else {
                        const inp = document.createElement('input');
                        inp.maxLength = 1;
                        inp.dataset.row = r;
                        inp.dataset.col = c;
                        inp.value = '';
                        inp.addEventListener('input', (e) => {
                            e.target.value = (e.target.value || '').toUpperCase().slice(0, 1);
                        });
                        cell.appendChild(inp);
                        if (puzzleGrid[r][c].number) {
                            const numDiv = document.createElement('div');
                            numDiv.className = 'number';
                            numDiv.textContent = puzzleGrid[r][c].number;
                            cell.appendChild(numDiv);
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderClues() {
            acrossCluesEl.innerHTML = '';
            downCluesEl.innerHTML = '';
            const sorted = placedWords.slice().sort((a, b) => (a.num || 0) - (b.num || 0));
            sorted.forEach(w => {
                const li = document.createElement('li');
                li.className = 'text-gray-700 list-disc ml-4';
                li.textContent = `${w.num}. ${w.clue}`;
                if (w.dir === 'down') downCluesEl.appendChild(li);
                else acrossCluesEl.appendChild(li);
            });
        }
        // --- (단어 배치 로직 끝) ---

        // 📝 채점 로직
        checkBtn.addEventListener('click', async () => {
            document.querySelectorAll('.cell input').forEach(inp => {
                inp.style.background = 'white';
                inp.classList.remove('bg-green-200', 'bg-red-200');
            });

            let correctCells = 0;
            let totalCells = 0;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cellData = puzzleGrid[r][c];
                    if (!cellData || !cellData.letter) continue;
                    const input = document.querySelector(`input[data-row='${r}'][data-col='${c}']`);
                    if (!input) continue;

                    totalCells++;
                    const userAns = (input.value || '').toUpperCase();
                    const correctAns = cellData.letter.toUpperCase();

                    if (userAns === correctAns) {
                        input.classList.add('bg-green-200');
                        correctCells++;
                    } else {
                        input.classList.add('bg-red-200');
                        input.value = correctAns;
                    }
                }
            }

            const percentage = totalCells > 0 ? Math.round((correctCells / totalCells) * 100) : 0;
            alert(`채점 결과: ${correctCells} / ${totalCells} 칸 정답 (${percentage}%)`);

            await logToolResult(correctCells, totalCells);

            if (currentWordbookId) {
                // 이 부분은 단어장 진도 업데이트 로직이 필요한 경우에 사용
                // updateWordbookProgress(
                //     currentWordbookId,
                //     correctCells,
                //     allWordbooksData[currentWordbookId].totalCells || totalCells
                // );
            }
        });

        // 🧾 Firestore 채점 결과 저장
        async function logToolResult(correct, total) {
            if (!cleanedEmail || !currentWordbookId) return;
            // 💡 cleanedEmail 적용
            const toolRef = doc(db, "users", cleanedEmail, "tool", new Date().toISOString()); 
            
            try {
                await setDoc(toolRef, {
                    type: "crossword",
                    wordbookName: currentWordbookId,
                    finishedAt: serverTimestamp(),
                    correctCells: correct,
                    totalCells: total
                }, { merge: true });
                console.log('✅ tool 로그 저장 완료 (십자말풀이)');
            } catch(e) {
                console.error('[❌ tool 로그 저장 실패]', e);
            }
        }

        refreshBtn.addEventListener('click', async () => {
            if (!authUser) return alert('로그인 후 사용하세요.');
            await populateWordbookList(authUser);
        });
        
    </script>
</body>
</html>
