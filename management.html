<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>단어장 관리 페이지 - 김남희</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .filter-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      font-size: 14px;
    }

    .wordbook-card {
      border: 2px solid #ccc;
      border-radius: 15px;
      padding: 15px 20px;
      margin-bottom: 10px;
      background-color: white;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .word-list {
      margin-left: 20px;
      background-color: #f8f8f8;
      padding: 10px;
      border-left: 3px solid #ccc;
    }

    .word-item {
      margin-bottom: 8px;
    }

    .word-item strong {
      display: inline-block;
      width: 80px;
    }

    .tool-dropdown {
      font-size: 14px;
      padding: 5px;
    }
  </style>
</head>
<body>
  <h1>단어장 관리 </h1>

  <div class="filter-bar">
    <label for="month-filter">월별 필터:</label>
    <select id="month-filter">
      <option value="all">전체 보기</option>
    </select>

    <label for="sort-select">정렬:</label>
    <select id="sort-select">
      <option value="date">날짜순</option>
      <option value="count">단어수순</option>
    </select>
  </div>

  <div id="wordbook-container"></div>

  <script>
    const data = [
      {
        date: "2025-02-03",
        words: [
          { word: "happy", meaning: "행복한", synonyms: ["joyful", "cheerful"] },
          { word: "bright", meaning: "밝은", synonyms: ["shiny", "radiant"] }
        ]
      },
      {
        date: "2025-02-02",
        words: [
          { word: "sad", meaning: "슬픈", synonyms: ["unhappy", "sorrowful"] }
        ]
      },
      {
        date: "2025-01-10",
        words: [
          { word: "happy", meaning: "행복한", synonyms: ["joyful", "cheerful"] },
          { word: "destruction", meaning: "파멸", synonyms: ["spoiling", "ruination"] },
          { word: "cold", meaning: "추운", synonyms: ["chilly", "freezing"] }
        ]
      },
      {
        date: "2024-12-29",
        words: [
          { word: "warm", meaning: "따뜻한", synonyms: ["cozy", "mild"] }
        ]
      }
    ];

    const container = document.getElementById("wordbook-container");
    const filter = document.getElementById("month-filter");
    const sortSelect = document.getElementById("sort-select");

    // 월별 필터 옵션 추가
    function populateMonthFilter() {
      const months = Array.from(new Set(data.map(d => d.date.slice(0, 7))));
      months.sort().reverse();
      months.forEach(month => {
        const opt = document.createElement("option");
        opt.value = month;
        opt.textContent = `${month}월`; 
        filter.appendChild(opt);
      });
    }

    // 단어장 목록 출력
    function renderWordbooks(filteredData) {
      container.innerHTML = '';
      const sorted = [...filteredData];
      const sortBy = sortSelect.value;

      if (sortBy === "date") {
        sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
      } else if (sortBy === "count") {
        sorted.sort((a, b) => b.words.length - a.words.length);
      }

      sorted.forEach(entry => {
        const card = document.createElement("div");
        card.className = "wordbook-card";

        const left = document.createElement("div");
        left.textContent = `${entry.date} - ${entry.words.length}단어`; 

        const toolSelect = document.createElement("select");
        toolSelect.className = "tool-dropdown";
        toolSelect.innerHTML = `
          <option selected disabled>학습도구 ▼</option>
          <option>플래시카드</option>
          <option>퀴즈</option>
          <option>복습</option>
        `; 

        card.appendChild(left);
        card.appendChild(toolSelect);

        card.addEventListener("click", (e) => {
          if (e.target.tagName.toLowerCase() === "select") return;
          toggleWordDetail(entry, card);
        });

        container.appendChild(card);
      });
    }

    // 카드 클릭 시 단어 목록 표시/숨기기
    function toggleWordDetail(entry, cardElement) {
      const existing = cardElement.nextSibling;
      if (existing && existing.classList.contains("word-list")) {
        existing.remove();
        return;
      }

      const list = document.createElement("div");
      list.className = "word-list";

      entry.words.forEach(word => {
        const item = document.createElement("div");
        item.className = "word-item";
        item.innerHTML = `<strong>${word.word}</strong> 의미: ${word.meaning}<br><strong>유의어:</strong> ${word.synonyms.join(', ')}`; 
        list.appendChild(item);
      });

      cardElement.after(list);
    }

    // 필터 변경 시
    filter.addEventListener("change", () => {
      const selected = filter.value;
      const filtered = selected === "all"
        ? data
        : data.filter(d => d.date.startsWith(selected));
      renderWordbooks(filtered);
    });

    // 정렬 변경 시
    sortSelect.addEventListener("change", () => {
      const selected = filter.value;
      const filtered = selected === "all"
        ? data
        : data.filter(d => d.date.startsWith(selected));
      renderWordbooks(filtered);
    });

    // 초기 실행
    populateMonthFilter();
    renderWordbooks(data);
  </script>
</body>
</html>
