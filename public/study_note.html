<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>어휘 학습</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body { 
      margin:0; 
      padding:0; 
      font-family:sans-serif; 
      background:#e0e0e0; 
    }
    nav { 
      padding:10px; 
      border-bottom:1px solid #ccc; 
      background:#fff; 
      display:flex; 
      justify-content:center; 
    }
    nav a { 
      margin-right:10px; 
      cursor:pointer; 
      text-decoration:underline; 
      color:black; 
    }
    nav a:nth-child(2), nav a:nth-child(3), .user-menu { margin-left:15px; }
    .user-menu { 
      position:relative; 
      display:inline-block; 
    }
    .user-dropdown { 
      display:none; 
      position:absolute; 
      background:#fff; 
      min-width:160px; 
      box-shadow:0 8px 16px rgba(0,0,0,0.2); 
      z-index:1; 
      top:25px; 
      right:0; 
      border-radius:6px; 
    }
    .user-dropdown a { 
      color:black; 
      padding:12px 16px; 
      text-decoration:none;
      display:block; 
      }
    .user-dropdown a:hover { 
      background:#ddd; 
    }
    .user-menu:hover .user-dropdown { 
      display:block; 
    }
    .filter-bar { 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      gap:10px; 
      margin-bottom:20px; 
      flex-wrap:wrap; 
    }
    select, input { 
      padding:8px; 
      font-size:14px; 
    }
    .wordbook-card { 
      border:2px solid #ccc; 
      border-radius:15px; 
      padding:15px 20px; 
      margin:10px auto; 
      max-width:600px; 
      background:#fff; 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
      cursor:pointer; 
    }
    .word-list { 
      margin:0 auto 20px auto; 
      max-width:600px; 
      background:#f8f8f8; 
      padding:10px; 
      border-left:3px solid #ccc; 
      text-align:left; 
    }
    .word-item { 
      margin-bottom:8px; 
    }
    .word-item strong { 
      display:inline-block; 
      width:80px; 
    }
    .tool-dropdown { 
      font-size:14px; 
      padding:5px; 
    }
    .hidden { 
      display:none; 
    }
    .word-row {
      display:flex; 
      justify-content:space-between; 
      margin-bottom:10px; 
    }
    .word-col, .synonym-col { flex:1; }
    .divider { width:20px; }
  </style>
</head>
<body>
  <nav>
    <a onclick="location.href='mainpage.html'">홈</a>
    <a onclick="location.href='study_note.html'">어휘 학습</a>
    <a onclick="location.href='study_tools.html'">학습 도구</a>
    <div id="authContainer"></div>
  </nav>

  <section id="vocab" class="active" style="text-align:center;">
    <h1 style="text-align:center;">어휘 학습 페이지</h1>
    <div class="filter-bar">
      <label for="month-filter">월별 필터:</label>
      <select id="month-filter"><option value="all">기간 선택</option></select>
      <label for="start-date">시작일:</label>
      <input type="date" id="start-date">
      <label for="end-date">종료일:</label>
      <input type="date" id="end-date">
      <label for="view-select">목록:</label>
      <select id="view-select">
        <option value="all">전체</option>
        <option value="word">단어/뜻</option>
        <option value="synonym">유의어</option>
      </select>
      <label for="sort-select">정렬:</label>
      <select id="sort-select">
        <option value="date">날짜순</option>
        <option value="count">단어수순</option>
      </select>
    </div>
    <div id="status-bar" style="text-align:center; font-size:13px; color:#555; margin-bottom:8px;"></div>
    <div id="wordbook-container"></div>
    <div id="detail-view" class="hidden">
      <h1 id="detail-title"></h1>
      <div id="word-list" class="word-list"></div>
      <button id="back-button">← 목록으로 돌아가기</button>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, Timestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

    // ===== 0) Firebase 설정 (전체) =====
    const firebaseConfig = {
      apiKey: "AIzaSyBXc7qF3lz2dbWOu1O3ftSNu8dye1RLk3E",
      authDomain: "auto-dictionary-29936.firebaseapp.com",
      projectId: "auto-dictionary-29936",
      storageBucket: "auto-dictionary-29936.appspot.com",
      messagingSenderId: "103494421267",
      appId: "1:103494421267:web:6762683fac5ac130e468e6",
      measurementId: "G-EKSJXHHRYS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const provider = new GoogleAuthProvider();

    // ===== 1) 엘리먼트 참조 =====
    const authContainer = document.getElementById("authContainer");
    const container = document.getElementById("wordbook-container");
    const filter = document.getElementById("month-filter");
    const sortSelect = document.getElementById("sort-select");
    const viewSelect = document.getElementById("view-select");
    const startDateInput = document.getElementById("start-date");
    const endDateInput = document.getElementById("end-date");
    const statusBar = document.getElementById("status-bar");

    let data = [];

    // ===== 2) 인증 UI (전체 구현) =====
    function login() {
      signInWithPopup(auth, provider)
        .then((r) => console.log('[로그인]', r.user?.email))
        .catch((e) => { console.error('[로그인 실패]', e); alert('로그인 중 오류가 발생했습니다.'); });
    }
    function logout() {
      signOut(auth)
        .then(() => console.log('[로그아웃] 완료'))
        .catch((e) => { console.error('[로그아웃 실패]', e); alert('로그아웃 중 오류가 발생했습니다.'); });
    }
    function updateAuthUI(user) {
      authContainer.innerHTML = '';
      if (user) {
        const name = user.displayName ? (user.displayName.length>8 ? user.displayName.slice(0,8)+'…' : user.displayName) : (user.email || '사용자');
        authContainer.innerHTML = `
          <div class="user-menu">
            <a href="javascript:void(0);" style="text-decoration:none">
              <span class="user-label">${name}</span>
              <img src="${user.photoURL || ''}" alt="사용자" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-left:6px;"/>
            </a>
            <div class="user-dropdown">
              <a href="#">${user.email}</a>
              <a href="statistics.html">통계</a>
              <a href="#" id="logoutBtn">로그아웃</a>
            </div>
          </div>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
      } else {
        authContainer.innerHTML = `<button id="loginBtn">로그인</button>`;
        document.getElementById('loginBtn')?.addEventListener('click', login);
      }
    }

    // ===== 3) 유틸리티 (전체 구현) =====
    // searchedAt 의 다양한 타입(Timestamp, {seconds,nanoseconds}, number, string)을 KST yyyy-mm-dd로 표준화
    function toKstDateString(v) {
      try {
        if (!v) return null;
        let d;
        if (typeof v?.toDate === 'function') d = v.toDate(); // Firestore Timestamp-like
        else if (v instanceof Timestamp) d = v.toDate();
        else if (typeof v === 'object' && 'seconds' in v && 'nanoseconds' in v) {
          d = new Date(v.seconds * 1000 + Math.floor(v.nanoseconds / 1e6));
        } else if (typeof v === 'number') d = new Date(v);
        else d = new Date(v); // string or Date
        if (isNaN(d.getTime())) return null;
        return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit' }).format(d);
      } catch (e) {
        console.warn('날짜 변환 실패:', v, e);
        return null;
      }
    }
    function firstOrEmpty(val) { return Array.isArray(val) ? (val[0] || '') : (val || ''); }
    function arrayOrEmpty(val) {
      if (Array.isArray(val)) return val;
      if (val === undefined || val === null || val === '') return [];
      return [String(val)];
    }
    function setStatus(msg) { statusBar.textContent = msg; }
    // 유의어 존재 여부 체크 (공백 제외)
    function hasSynonyms(w){
      if (!w) return false;
      const arr = Array.isArray(w.synonyms) ? w.synonyms : [];
      return arr.some(s => String(s ?? '').trim().length > 0);
    }

    // ===== 4) Firestore 로드 (실제 경로 고정: users/{email}/searchHistory) =====
    async function fetchHistoryDocs(user) {
      const emailPath = query(collection(db, 'users', user.email, 'searchHistory'));
      const snap = await getDocs(emailPath);
      return { snap, used: 'email' };
    }

    onAuthStateChanged(auth, async (user) => {
      try {
        updateAuthUI(user);
        if (!user) {
          container.innerHTML = '<div style="margin:20px;">로그인 후 이용해주세요.</div>';
          setStatus('미로그인');
          return;
        }

        const wordMap = new Map();

        const { snap, used } = await fetchHistoryDocs(user);
        console.log('[경로]', used, '문서수=', snap.size);

        let first = true;
        snap.forEach((docSnap) => {
          const item = docSnap.data();
          if (first) { console.log('[샘플 문서]', docSnap.id, item); first = false; }
          if (!item || !item.word) return;
          const meaning = firstOrEmpty(item.meaning);
          const synonyms = arrayOrEmpty(item.synonyms);
          const date = toKstDateString(item.searchedAt);
          if (!date) return;
          if (!wordMap.has(date)) wordMap.set(date, []);
          wordMap.get(date).push({ word: item.word, meaning, synonyms });
        });

        data = Array.from(wordMap.entries()).map(([date, words]) => ({ date, words }));

        populateMonthFilter();
        renderWordbooks(getFiltered());

        // 이벤트 바인딩
        filter.onchange = () => {
          const isAll = filter.value === 'all';
          // 월별 필터가 '전체 보기'가 아니면 날짜 선택 비활성화
          startDateInput.disabled = !isAll;
          endDateInput.disabled = !isAll;
          if (!isAll) {
            startDateInput.value = '';
            endDateInput.value = '';
          }
          renderWordbooks(getFiltered());
        };
        sortSelect.onchange = () => renderWordbooks(getFiltered());
        viewSelect.onchange = () => renderWordbooks(getFiltered());
        startDateInput.onchange = () => renderWordbooks(getFiltered());
        endDateInput.onchange = () => renderWordbooks(getFiltered());
      } catch (err) {
        console.error('[onAuthStateChanged 오류]', err);
        setStatus('불러오기 실패');
        container.innerHTML = `<div style="max-width:600px;margin:12px auto;padding:12px;background:#fff;border:1px solid #f2caca;border-radius:8px;color:#a33;">데이터를 불러오는 중 오류가 발생했습니다.<br><code>${err?.message || err}</code></div>`;
      }
    });

    // ===== 5) 필터/정렬/보기 모드 =====
    function populateMonthFilter() {
      while (filter.options.length > 1) filter.remove(1);
      const months = Array.from(new Set(data.map(d => d.date.slice(0,7)))).sort().reverse();
      months.forEach((m) => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = `${m}월`;
        filter.appendChild(opt);
      });
    }

    function getFiltered() {
      const selectedMonth = filter.value;
      const start = startDateInput.value ? new Date(startDateInput.value) : null;
      const end = endDateInput.value ? new Date(endDateInput.value) : null;
      if (end) end.setHours(23,59,59,999);
      let filtered = [...data];
      if (start && end) {
        filtered = filtered.filter(d => {
          const dt = new Date(d.date);
          return dt >= start && dt <= end;
        });
      } else if (selectedMonth !== 'all') {
        filtered = filtered.filter(d => d.date.startsWith(selectedMonth));
      }
      return filtered;
    }

    function renderWordbooks(filteredData = data) {
      container.innerHTML = '';
      const sorted = [...filteredData];
      const sortBy = sortSelect.value;
      if (sortBy === 'date') sorted.sort((a,b)=> new Date(b.date) - new Date(a.date));
      else if (sortBy === 'count') sorted.sort((a,b)=> b.words.length - a.words.length);

      sorted.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'wordbook-card';

        const left = document.createElement('div');
        const dateLink = document.createElement('a');
        dateLink.href = '#';
        dateLink.textContent = entry.date;
        dateLink.style.textDecoration = 'underline';
        dateLink.style.color = 'blue';
        dateLink.style.cursor = 'pointer';
        dateLink.addEventListener('click', (e) => { e.preventDefault(); showDetailView(entry); });

        left.appendChild(dateLink);
        left.appendChild(document.createTextNode(` - ${entry.words.length}단어`));

        const toolSelect = document.createElement('select');
        toolSelect.className = 'tool-dropdown';
        toolSelect.innerHTML = `
          <option selected disabled>학습도구 ▼</option>
          <option>플래시카드</option>
          <option>퀴즈</option>
          <option>복습</option>
        `;

        card.appendChild(left);
        card.appendChild(toolSelect);

        card.addEventListener('click', (e) => {
          if (['select','a'].includes(e.target.tagName.toLowerCase())) return;
          toggleWordDetail(entry, card);
        });

        container.appendChild(card);
      });
    }

    function toggleWordDetail(entry, cardElement) {
      const existing = cardElement.nextSibling;
      if (existing && existing.classList.contains('word-list')) { existing.remove(); return; }
      const list = document.createElement('div');
      list.className = 'word-list';
      const mode = viewSelect.value; // all | word | synonym
      entry.words.forEach(w => {
        if (mode === 'synonym' && !hasSynonyms(w)) return; // 유의어가 없으면 생략
        const item = document.createElement('div');
        item.className = 'word-item';
        if (mode === 'all') {
          const syn = hasSynonyms(w) ? w.synonyms.join(', ') : '';
          item.innerHTML = `<strong>${w.word}</strong> 의미: ${w.meaning}<br><strong>유의어:</strong> ${syn}`;
        } else if (mode === 'word') {
          item.innerHTML = `<strong>${w.word}</strong> 의미: ${w.meaning}`;
        } else if (mode === 'synonym') {
          item.innerHTML = `${w.meaning || w.word}: ${w.synonyms.join(', ')}`;
        }
        list.appendChild(item);
      });
      cardElement.after(list);
    }

    
    

    function showDetailView(entry) {
      document.getElementById('wordbook-container').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
      document.querySelector('#vocab h1').classList.add('hidden');
      document.querySelector('.filter-bar').classList.add('hidden');
      const title = document.getElementById('detail-title');
      const list = document.getElementById('word-list');
      title.textContent = `${entry.date} 단어장`;
      list.innerHTML = '';
      const mode = viewSelect.value;
      entry.words.forEach(w => {
        if (mode === 'synonym' && !hasSynonyms(w)) return; // 유의어 없으면 생략
        const item = document.createElement('div');
        item.className = 'word-item';
        if (mode === 'all') {
          const syn = hasSynonyms(w) ? w.synonyms.join(', ') : '';
          item.innerHTML = `<div class="word-row"><div class="word-col"><strong>${w.word}</strong><div class="meaning">의미: ${w.meaning}</div></div><div class="divider"></div><div class="synonym-col"><strong>유의어:</strong> ${syn}</div></div>`;
        } else if (mode === 'word') {
          item.innerHTML = `<strong>${w.word}</strong> 의미: ${w.meaning}`;
        } else if (mode === 'synonym') {
          item.innerHTML = `${w.meaning || w.word}: ${w.synonyms.join(', ')}`;
        }
        list.appendChild(item);
      });
    }

    function goBack(){
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('wordbook-container').classList.remove('hidden');
      document.querySelector('#vocab h1').classList.remove('hidden');
      document.querySelector('.filter-bar').classList.remove('hidden');
    }
    document.getElementById('back-button').addEventListener('click', goBack);
  </script>
</body>
</html>
