<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>십자말풀이 게임</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;600;700&display=swap');
        body {
            font-family: 'Gothic A1', sans-serif;
            background-color: #F7F9FC;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        /* ------------------ 기존 십자말풀이 스타일 유지 및 Tailwind로 조정 ------------------ */
        .grid-container {
            display:flex; 
            justify-content:center; 
            gap:40px; 
            margin:0 auto 24px; 
            max-width:1200px;
        }
        .grid { 
            display:grid; 
            grid-template-columns: repeat(15, minmax(0, 40px)); /* 15x15 그리드 */
            grid-template-rows: repeat(15, minmax(0, 40px));
            gap: 1px; /* 간격 축소 */
            background:#D1D5DB; /* lightgray */
            padding: 2px;
            border-radius: 6px;
        }
        .cell { 
            width:40px; 
            height:40px; 
            background:#fff; 
            position:relative; 
            box-sizing:border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell.blocked { 
            background:#E5E7EB; /* gray-200 */
        }
        .cell input { 
            width:100%; 
            height:100%; 
            border:none; 
            text-align:center; 
            font-size:1.125rem; /* text-lg */
            font-weight:bold; 
            background:transparent;
            text-transform: uppercase;
        }
        .cell input:focus { 
            outline:3px solid #6366F1; /* blue-600 포커스 */
            z-index: 10;
        }
        .number { 
            position:absolute; 
            top:1px; 
            left:3px; 
            font-size:0.6rem; /* text-xs 보다 작게 */
            color:#4B5563; /* gray-600 */
            pointer-events:none; 
            line-height: 1;
        }
        /* 단어장 목록 카드 스타일 */
        .wordbook-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border-left: 5px solid transparent; 
        }
        .wordbook-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        .user-wordbook {
            border-left-color: #6366F1; /* blue-600 */
        }
        .auto-wordbook {
            border-left-color: #10B981; /* emerald-500 */
        }
        .progress-bar-container {
            background-color: #E5E7EB;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #6366F1;
            height: 100%;
            transition: width 0.5s ease-in-out;
        }
        .clues h3 {
            border-bottom: 2px solid #D1D5DB;
            padding-bottom: 4px;
            margin-top: 1rem;
            font-weight: 700;
            color: #1F2937;
        }
        .clues ul { 
            padding-left: 1.5rem; 
        }
        .clues li { 
            margin: 0.5rem 0; 
            font-size: 0.875rem; /* text-sm */
            line-height: 1.4;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="bg-white shadow-md py-4">
        <nav class="container flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a onclick="location.href='mainpage.html'" class="text-gray-800 text-lg font-bold hover:text-blue-600">홈</a>
                <a onclick="location.href='study_note.html'" class="text-gray-800 text-lg font-bold hover:text-blue-600">어휘 학습</a>
                <a onclick="location.href='study_tools.html'" class="text-blue-600 text-lg font-bold">학습 도구</a>
                <div id="authContainer" class="flex items-center space-x-4">
                    </div>
            </div>
            <div class="flex items-center space-x-4" id="authPlaceholder">
                <a href="#" class="text-gray-800 text-sm font-semibold hover:text-blue-600">로그인</a>
                <a href="#" class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition">회원가입</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="crossword-list-section" class="">
            <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">십자말풀이 게임</h1>
            <div id="wordbook-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            </div>
        </section>

        <section id="crossword-study-section" class="hidden">
            <div class="flex justify-between items-center max-w-2xl mx-auto mb-6">
                <a href="#" onclick="showCrosswordList(); return false;" class="text-gray-500 hover:text-blue-600 transition">
                    <i class="fas fa-arrow-left mr-2"></i>목록으로
                </a>
                <button id="refreshBtn" class="px-4 py-2 rounded-full bg-white text-gray-800 text-sm font-semibold border border-gray-300 hover:bg-gray-100 transition">
                    <i class="fas fa-sync-alt mr-1"></i>단어장 새로고침
                </button>
            </div>
            <h1 id="crossword-study-title" class="text-3xl font-bold text-gray-900 mb-8 text-center"></h1>
            
            <div class="grid-container">
                <div id="grid" class="grid" aria-label="퍼즐 그리드"></div>
                <div class="clues w-[300px] lg:w-[400px] max-h-[650px] overflow-auto p-4 bg-white rounded-lg shadow-md">
                    <h3 class="text-xl">가로 문제</h3>
                    <ul id="acrossClues"></ul>
                    <h3 class="text-xl">세로 문제</h3>
                    <ul id="downClues"></ul>
                </div>
            </div>
            <div class="max-w-md mx-auto mt-6">
                <button class="w-full py-3 bg-blue-600 text-white text-lg font-semibold rounded-lg shadow-md hover:bg-blue-700 transition" id="checkBtn">
                    정답 확인 / 채점
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, signOut, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

        // ✅ Firebase 설정 (보안: GitHub 업로드 시 API 키 제거 요청 반영)
        const firebaseConfig = {
            apiKey: "", // 실제 배포 환경에서는 여기에 유효한 API 키를 넣어주세요.
            authDomain: "auto-dictionary-29936.firebaseapp.com",
            projectId: "auto-dictionary-29936",
            storageBucket: "auto-dictionary-29936.appspot.com",
            messagingSenderId: "103494421267",
            appId: "1:103494421267:web:6762683fac5ac130e468e6",
            measurementId: "G-EKSJXHHRYS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const SIZE = 15;
        const MAX_WORDS = 30;

        // UI 요소 참조
        const crosswordListSection = document.getElementById('crossword-list-section');
        const crosswordStudySection = document.getElementById('crossword-study-section');
        const wordbookListContainer = document.getElementById('wordbook-list-container');
        const crosswordStudyTitle = document.getElementById('crossword-study-title');
        const authContainer = document.getElementById('authContainer');
        const authPlaceholder = document.getElementById('authPlaceholder');
        const gridEl = document.getElementById('grid');
        const acrossCluesEl = document.getElementById('acrossClues');
        const downCluesEl = document.getElementById('downClues');
        const refreshBtn = document.getElementById('refreshBtn');
        const checkBtn = document.getElementById('checkBtn');

        let puzzleGrid = [];
        let placedWords = [];
        let authUser = null;
        let allWordbooksData = {}; 
        let currentWordbookId = null; // 현재 선택된 단어장 ID를 저장할 변수 추가

        // 화면 전환 함수
        function showSection(section) {
            [crosswordListSection, crosswordStudySection].forEach(s => s.classList.add('hidden'));
            section.classList.remove('hidden');
        }
        function showCrosswordList() {
            showSection(crosswordListSection);
        }

        // KST 날짜 변환 함수
        function toKstDateString(v) {
            try {
                if (!v) return null;
                let d;
                if (typeof v?.toDate === 'function') d = v.toDate();
                else if (v && typeof v.seconds === 'number')
                    d = new Date(v.seconds * 1000 + Math.floor((v.nanoseconds||0)/1e6));
                else d = new Date(v);
                if (isNaN(d.getTime())) return null;
                return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit' }).format(d);
            } catch (e) { return null; }
        }

        // 인증 UI 렌더링
        function renderAuthUI(user) {
            authContainer.innerHTML = '';
            authPlaceholder.classList.add('hidden');
            if (user) {
                const btn = document.createElement('button');
                btn.textContent = '로그아웃';
                btn.className = 'px-4 py-2 rounded-full bg-red-500 text-white text-sm font-semibold hover:bg-red-600 transition';
                btn.onclick = async () => { await signOut(auth); };
                authContainer.appendChild(btn);
            } else {
                authPlaceholder.classList.remove('hidden'); 
            }
        }

        onAuthStateChanged(auth, async (user) => {
            authUser = user;
            renderAuthUI(user);
            if (user) await populateWordbookList(user);
            else {
                // 로그인 상태가 아닐 때: 회색 블록 배경 없이 안내 메시지만 표시 (수정됨)
                wordbookListContainer.innerHTML = `
                    <p class="text-center col-span-full text-lg text-gray-500 py-10">
                        단어장을 확인하려면 로그인해주세요.
                    </p>
                `;
            }
        });
        
        // 단어장 진행률 업데이트 함수
        function updateWordbookProgress(wordbookId, correctCells, totalCells) {
            if (!allWordbooksData[wordbookId] || totalCells === 0) return;

            const percentage = Math.round((correctCells / totalCells) * 100);
            allWordbooksData[wordbookId].correctCells = correctCells;
            allWordbooksData[wordbookId].progress = percentage;

            const safeId = wordbookId.replace(/-/g, '_');
            const progressBar = document.getElementById(`progress-bar-${safeId}`);
            const progressText = document.getElementById(`progress-text-${safeId}`);

            if (progressBar) {
                progressBar.style.width = `${percentage}%`;
            }
            if (progressText) {
                progressText.textContent = `진행률: ${percentage}% (${correctCells}/${totalCells})`;
            }
        }


        // 단어장 목록 렌더링 함수
        async function populateWordbookList(user) {
            // 로딩 중: 카드 스타일 없이 텍스트 메시지만 표시
            wordbookListContainer.innerHTML = `
                <p class="text-center col-span-full text-lg text-gray-500 py-10"><i class="fas fa-sync fa-spin mr-2"></i>단어장을 불러오는 중...</p>
            `;
            allWordbooksData = {}; 
            
            try {
                const snap = await getDocs(collection(db, 'users', user.email, 'searchHistory'));
                const dateMap = new Map();
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const dateStr = toKstDateString(d.searchedAt);
                    if (!dateStr || !d.word) return;
                    if (!dateMap.has(dateStr)) dateMap.set(dateStr, []);
                    dateMap.get(dateStr).push(d);
                });
                
                wordbookListContainer.innerHTML = "";
                const dates = Array.from(dateMap.keys()).sort((a,b) => b.localeCompare(a));
                
                if (dates.length === 0) {
                    wordbookListContainer.innerHTML = `<p class="text-center col-span-full text-gray-500 mt-4">단어장 기록이 없습니다.</p>`;
                    return;
                }

                dates.forEach((dt, index) => {
                    const dataList = dateMap.get(dt);
                    const wordbookId = dt; 
                    
                    const wordsForCrossword = dataList.map(d => {
                        const meanings = Array.isArray(d.meaning) ? d.meaning : (d.meaning ? [d.meaning] : []);
                        return { word: String(d.word).toUpperCase(), clue: String(meanings[0] || d.word) };
                    }).filter(item => item.word.length <= SIZE && item.word.length > 1); 

                    if (wordsForCrossword.length === 0) return; 

                    // allWordbooksData 구조 변경: words와 progress 저장
                    allWordbooksData[wordbookId] = {
                        words: wordsForCrossword,
                        progress: 0, // 기본 진행률 0%
                        totalCells: 0,
                        correctCells: 0,
                    };

                    const card = document.createElement('div');
                    card.id = `wordbook-card-${wordbookId.replace(/-/g, '_')}`; // ID 추가
                    card.className = `wordbook-card ${index % 2 === 0 ? 'user-wordbook' : 'auto-wordbook'}`; // 홀짝에 따라 색상 분리
                    card.dataset.wordbookId = wordbookId;
                    card.onclick = () => loadSelectedDate(wordbookId);
                    
                    const percentage = allWordbooksData[wordbookId].progress;
                    const correct = allWordbooksData[wordbookId].correctCells;
                    const total = allWordbooksData[wordbookId].totalCells;
                    const barColor = index % 2 === 0 ? '#6366F1' : '#10B981';

                    card.innerHTML = `
                        <div class="flex items-center mb-4">
                            <i class="fa-solid fa-calendar-alt text-xl mr-3" style="color:${barColor};"></i>
                            <h3 class="text-xl font-bold text-gray-800">${dt} 단어장</h3>
                        </div>
                        <p class="text-gray-600 mb-4">총 ${dataList.length}개 단어 · ${wordsForCrossword.length}개 사용 가능</p>
                        <div class="progress-bar-container">
                            <div id="progress-bar-${wordbookId.replace(/-/g, '_')}" class="progress-bar" style="width: ${percentage}%; background-color:${barColor};"></div>
                        </div>
                        <p id="progress-text-${wordbookId.replace(/-/g, '_')}" class="text-right text-sm text-gray-500 mt-2">${total > 0 ? `진행률: ${percentage}% (${correct}/${total})` : '퍼즐 생성 준비 완료'}</p>
                    `;
                    wordbookListContainer.appendChild(card);
                });

            } catch (e) {
                wordbookListContainer.innerHTML = `<p class="text-center col-span-full text-red-500 mt-4">단어장 로딩 중 오류 발생: ${e.message}</p>`;
            }
        }
        
        refreshBtn.addEventListener('click', async () => {
            if (!authUser) return alert('로그인 후 사용하세요.');
            await populateWordbookList(authUser);
        });

        // 선택한 단어장으로 퍼즐 생성 시작
        async function loadSelectedDate(wordbookId) {
            if (!authUser) return alert('로그인 후 사용하세요.');
            if (firebaseConfig.apiKey === "") {
                alert("경고: API 키가 설정되지 않았습니다. Firebase 인증 및 데이터 로드가 실패할 수 있습니다.");
            }
            
            const list = allWordbooksData[wordbookId].words;
            currentWordbookId = wordbookId; // 현재 ID 저장

            if (!list || list.length === 0) {
                 return alert('선택한 단어장에 유효한 단어가 없습니다.');
            }

            placedWords = [];
            puzzleGrid = Array.from({length: SIZE}, () => Array.from({length: SIZE}, () => null));

            let idx = 1;
            for (const item of list.slice(0, MAX_WORDS)) {
                if (item.word.length > SIZE) continue;
                const placed = placeWord(item, idx);
                if (!placed) forcePlaceWord(item, idx);
                idx++;
            }
           
            // 총 정답 칸 수 계산 및 저장
            let totalCells = 0;
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    if (puzzleGrid[r][c] && puzzleGrid[r][c].letter) {
                        totalCells++;
                    }
                }
            }
            allWordbooksData[wordbookId].totalCells = totalCells;
           

            crosswordStudyTitle.textContent = `${wordbookId} 십자말풀이`;
            createGrid();
            renderClues();
            showSection(crosswordStudySection); 
        }
        
        // -----------------------------------------------------
        // ✅ 기존 십자말풀이 핵심 로직 함수 (유지)
        // -----------------------------------------------------

        function canPlace(word, row, col, dir) { 
            for (let k = 0; k < word.length; k++) {
                const r = row + (dir === 'down' ? k : 0);
                const c = col + (dir === 'across' ? k : 0);
                if (r < 0 || c < 0 || r >= SIZE || c >= SIZE) return false;
                if (puzzleGrid[r][c] && puzzleGrid[r][c].letter && puzzleGrid[r][c].letter !== word[k]) return false;
            }
            return true;
        }

        function applyPlacement(word, row, col, dir, num) { 
             for (let k = 0; k < word.length; k++) {
                const r = row + (dir === 'down' ? k : 0);
                const c = col + (dir === 'across' ? k : 0);
                puzzleGrid[r][c] = puzzleGrid[r][c] || { letter: '', number: null };
                puzzleGrid[r][c].letter = word[k];
                if (k === 0 && puzzleGrid[r][c].number === null) {
                    puzzleGrid[r][c].number = num;
                }
            }
        }

        function placeWord(item, num) { 
            const word = item.word;
            if (placedWords.length === 0) {
                const row = Math.floor(SIZE / 2);
                const startCol = Math.floor((SIZE - word.length) / 2);
                if (canPlace(word, row, startCol, 'across')) {
                    applyPlacement(word, row, startCol, 'across', num);
                    placedWords.push({ ...item, row, col: startCol, dir: 'across', num });
                    return true;
                }
            }
            for (const existing of placedWords) {
                for (let i = 0; i < word.length; i++) {
                    for (let j = 0; j < existing.word.length; j++) {
                        if (word[i] === existing.word[j]) {
                            let row, col, dir;
                            if (existing.dir === 'across') {
                                row = existing.row - i;
                                col = existing.col + j;
                                dir = 'down';
                            } else {
                                row = existing.row + j;
                                col = existing.col - i;
                            }
                            if (canPlace(word, row, col, dir)) {
                                applyPlacement(word, row, col, dir, num);
                                placedWords.push({ ...item, row, col, dir, num });
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        function forcePlaceWord(item, num) { 
            const word = item.word;
            let attempts = 0;
            while (attempts < 100) {
                const dir = Math.random() < 0.5 ? 'across' : 'down';
                const row = Math.floor(Math.random() * SIZE);
                const col = Math.floor(Math.random() * SIZE);
                if (canPlace(word, row, col, dir)) {
                    applyPlacement(word, row, col, dir, num);
                    placedWords.push({ ...item, row, col, dir, num });
                    return true;
                }
                attempts++;
            }
            return false;
        }
        // -----------------------------------------------------
        
        function createGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (!puzzleGrid[r][c]) {
                        cell.classList.add('blocked');
                    } else {
                        const inp = document.createElement('input');
                        inp.maxLength = 1;
                        inp.dataset.row = r;
                        inp.dataset.col = c;
                        inp.value = '';
                        inp.addEventListener('input', (e) => {
                            e.target.value = (e.target.value || '').toUpperCase().slice(0,1);
                        });
                        cell.appendChild(inp);
                        if (puzzleGrid[r][c].number) {
                            const numDiv = document.createElement('div');
                            numDiv.className = 'number';
                            numDiv.textContent = puzzleGrid[r][c].number;
                            cell.appendChild(numDiv);
                        }
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function renderClues() {
            acrossCluesEl.innerHTML = '';
            downCluesEl.innerHTML = '';
            const sorted = placedWords.slice().sort((a,b) => (a.num||0) - (b.num||0));
            sorted.forEach(w => {
                const li = document.createElement('li');
                li.className = 'text-gray-700 list-disc ml-4'; 
                li.textContent = `${w.num}. ${w.clue}`;
                if ((w.dir || w.direction) === 'down') downCluesEl.appendChild(li);
                else acrossCluesEl.appendChild(li);
            });
        }

        // 정답 확인 버튼 (수정됨)
        checkBtn.addEventListener('click', () => {
            document.querySelectorAll('.cell input').forEach(inp => { 
                inp.style.background = 'white'; 
                inp.classList.remove('bg-green-200', 'bg-red-200'); // 기존 배경색 클래스 제거
            });

            let correctCells = 0;
            let totalCells = 0;
           
            // 전체 퍼즐 칸을 순회하여 채점
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    const cellData = puzzleGrid[r][c];
                    if (!cellData || !cellData.letter) continue; // 빈 칸 건너뛰기
                   
                    const input = document.querySelector(`input[data-row='${r}'][data-col='${c}']`);
                    if (!input) continue;

                    totalCells++;
                    const userAns = (input.value || '').toUpperCase();
                    const correctAns = cellData.letter.toUpperCase();

                    if (userAns === correctAns) {
                        input.classList.add('bg-green-200');
                        correctCells++;
                    } else {
                        input.classList.add('bg-red-200');
                        input.value = correctAns; // 정답 표시
                    }
                }
            }

            const percentage = totalCells > 0 ? Math.round((correctCells / totalCells) * 100) : 0;
            alert(`채점 결과: ${correctCells} / ${totalCells} 칸 정답 (${percentage}%)`);
           
            // 진행률 업데이트
            if (currentWordbookId) {
                updateWordbookProgress(currentWordbookId, correctCells, allWordbooksData[currentWordbookId].totalCells || totalCells);
            }
        });

        // 초기 화면 설정
        window.onload = () => {
