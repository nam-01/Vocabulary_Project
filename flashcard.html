<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래시카드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;600;700&display=swap');
        body {
            font-family: 'Gothic A1', sans-serif;
            background-color: #F7F9FC;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .wordbook-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .wordbook-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        .user-wordbook {
            border-left: 5px solid #6366F1;
        }
        .auto-wordbook {
            border-left: 5px solid #10B981;
        }
        .progress-bar-container {
            background-color: #E5E7EB;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #6366F1;
            height: 100%;
            transition: width 0.5s ease-in-out;
        }
        .flashcard-container {
            width: 100%;
            height: 400px;
            perspective: 1000px;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .word-complete-btn {
            background-color: #fff;
            border: 2px solid #E5E7EB;
            border-radius: 9999px;
            padding: 1rem 2rem;
            width: 100%;
            transition: all 0.2s;
            color: #333;
            font-weight: 600;
        }
        .word-complete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .word-complete-btn.correct {
            background-color: #D1FAE5;
            border-color: #10B981;
            color: #10B981;
        }
        .word-complete-btn.incorrect {
            background-color: #FEE2E2;
            border-color: #EF4444;
            color: #EF4444;
        }
        .word-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #EF4444;
        }
        .word-card.completed {
            border-left-color: #10B981;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 네비게이션 바 -->
    <header class="bg-white shadow-md py-4">
        <nav class="container flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <a href="#" class="text-gray-800 text-lg font-bold">홈</a>
                <a href="#" class="text-gray-800 text-lg font-bold">단어장</a>
                <a href="#" class="text-blue-600 text-lg font-bold">학습 도구</a>
                <a href="#" class="text-gray-800 text-lg font-bold">사용자</a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="#" class="text-gray-800 text-sm font-semibold hover:text-blue-600">로그인</a>
                <a href="#" class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition">회원가입</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- 플래시카드 선택 화면 -->
        <section id="flashcard-list-section">
            <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">플래시카드</h1>
            <div id="flashcard-wordbook-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 단어장 카드들이 여기에 동적으로 추가됩니다 -->
            </div>
        </section>

        <!-- 플래시카드 학습 화면 -->
        <section id="flashcard-study-section" class="hidden text-center">
            <div class="flex justify-between items-center max-w-2xl mx-auto mb-4">
                <a href="#" onclick="showFlashcardList(); return false;" class="text-gray-500 hover:text-blue-600 transition">
                    <i class="fas fa-arrow-left mr-2"></i>목록으로
                </a>
                <p id="flashcard-study-count" class="text-lg font-semibold text-gray-500"></p>
            </div>
            <h1 id="flashcard-study-title" class="text-3xl font-bold text-gray-900 mb-8"></h1>
            
            <div class="flashcard-container max-w-2xl mx-auto">
                <div id="flashcard-inner" class="flashcard-inner">
                    <div class="flashcard-front card">
                        <p id="flashcard-word" class="text-5xl font-bold text-gray-900"></p>
                    </div>
                    <div class="flashcard-back card">
                        <div class="space-y-4 text-left w-full">
                            <p id="flashcard-meaning" class="text-4xl font-bold text-gray-800 text-center mb-4"></p>
                            <p class="text-xl font-bold text-gray-700 mb-2">뜻: <span id="back-meaning" class="font-normal text-gray-800"></span></p>
                            <p class="text-xl font-bold text-gray-700 mb-2">유의어: <span id="back-synonyms" class="font-normal text-gray-800"></span></p>
                            <p class="text-xl font-bold text-gray-700 mb-2">반의어: <span id="back-antonyms" class="font-normal text-gray-800"></span></p>
                            <p class="text-xl font-bold text-gray-700 mb-2">예문: <span id="back-example" class="font-normal text-gray-800"></span></p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="completion-buttons" class="mt-8 max-w-md mx-auto flex justify-center space-x-4 hidden">
                <button onclick="markAsIncorrect()" class="w-1/2 py-4 rounded-full bg-white text-gray-800 font-semibold hover:bg-gray-200 transition">
                    <i class="fas fa-times text-red-500 mr-2"></i>
                </button>
                <button onclick="markAsCorrect()" class="w-1/2 py-4 rounded-full bg-white text-gray-800 font-semibold hover:bg-gray-200 transition">
                    <i class="fas fa-check text-green-500 mr-2"></i>
                </button>
            </div>
            
        </section>

        <!-- 플래시카드 완료 화면 -->
        <section id="flashcard-complete-section" class="hidden text-center">
            <h1 id="flashcard-complete-title" class="text-3xl font-bold text-gray-900 mb-4"></h1>
            <p id="flashcard-complete-count" class="text-lg text-gray-500 mb-8"></p>
            <div class="quiz-card p-12 max-w-lg mx-auto">
                <p class="text-4xl font-bold text-gray-900">학습 완료</p>
            </div>
            <div class="flex justify-center space-x-4 mt-8">
                <button onclick="restartFlashcard()" class="px-6 py-3 rounded-full bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">
                    다시 하기
                </button>
            </div>
            <a href="#" onclick="showFlashcardList(); return false;" class="block mt-4 text-gray-500 hover:text-blue-600 transition">
                <i class="fas fa-arrow-left mr-2"></i>목록으로
            </a>
            
            <div id="incorrect-words-section" class="mt-8 hidden">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">다시 학습할 단어</h2>
                <div id="incorrect-words-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 틀린 단어 카드들이 여기에 표시됩니다. -->
                </div>
            </div>
        </section>

    </main>

    <script>
        // 샘플 데이터
        const wordbooks = {
            'wordbook-1': {
                title: '2025년 7월 10일 단어장',
                lastStudied: '2025.09.18',
                totalWords: 14,
                completedWords: 1,
                words: [
                    { word: 'increase', meaning: '증가하다, 늘리다', synonyms: 'gain, enlargement', antonyms: 'decrease, lessen', example: 'She says an increase in melting from climate change may put that at risk.' },
                    { word: 'refuse', meaning: '거절하다', synonyms: 'reject, deny', antonyms: 'accept, agree', example: 'He refused to tell us his name.' },
                    { word: 'gain', meaning: '얻다, 증가하다', synonyms: 'acquire, obtain', antonyms: 'lose, forfeit', example: 'He gained a lot of experience.' },
                    { word: 'lose', meaning: '잃다, 지다', synonyms: 'misplace, forfeit', antonyms: 'gain, win', example: "I don't want to lose my keys." },
                ]
            },
            'wordbook-2': {
                title: '오답 단어장',
                lastStudied: '2025.09.17',
                totalWords: 8,
                completedWords: 3,
                words: [
                    { word: 'diminish', meaning: '줄어들다', synonyms: 'decrease, lessen', antonyms: 'increase, grow', example: 'The number of new cases is decreasing.' },
                    { word: 'obtain', meaning: '획득하다', synonyms: 'acquire, gain', antonyms: 'lose, forfeit', example: 'I hope to obtain a loan from the bank.' },
                ]
            }
        };

        // UI 요소 참조
        const flashcardListSection = document.getElementById('flashcard-list-section');
        const flashcardStudySection = document.getElementById('flashcard-study-section');
        const flashcardCompleteSection = document.getElementById('flashcard-complete-section');
        const flashcardStudyTitle = document.getElementById('flashcard-study-title');
        const flashcardStudyCount = document.getElementById('flashcard-study-count');
        const flashcardWord = document.getElementById('flashcard-word');
        const flashcardMeaning = document.getElementById('flashcard-meaning');
        const flashcardInner = document.getElementById('flashcard-inner');
        const completionButtons = document.getElementById('completion-buttons');
        const flashcardCompleteTitle = document.getElementById('flashcard-complete-title');
        const flashcardCompleteCount = document.getElementById('flashcard-complete-count');
        const incorrectWordsSection = document.getElementById('incorrect-words-section');
        const incorrectWordsList = document.getElementById('incorrect-words-list');
        const flashcardWordbookList = document.getElementById('flashcard-wordbook-list');

        let currentFlashcardData = [];
        let currentFlashcardIndex = 0;
        let incorrectWords = [];

        // 화면 전환 함수
        function showSection(section) {
            [flashcardListSection, flashcardStudySection, flashcardCompleteSection].forEach(s => s.classList.add('hidden'));
            section.classList.remove('hidden');
        }

        // 초기 단어장 목록 렌더링
        function renderWordbookList() {
            flashcardWordbookList.innerHTML = '';
            for (const key in wordbooks) {
                const wordbook = wordbooks[key];
                const card = document.createElement('div');
                card.className = `wordbook-card ${key.includes('user') ? 'user-wordbook' : 'auto-wordbook'}`;
                card.dataset.wordbookId = key;
                card.onclick = () => selectFlashcard(card);
                
                const percentage = Math.round((wordbook.completedWords / wordbook.totalWords) * 100);
                const barColor = key.includes('user') ? '#6366F1' : '#10B981';

                card.innerHTML = `
                    <div class="flex items-center mb-4">
                        <i class="fa-solid ${key.includes('user') ? 'fa-user' : 'fa-robot'} text-xl mr-3" style="color:${barColor};"></i>
                        <h3 class="text-xl font-bold text-gray-800">${wordbook.title}</h3>
                    </div>
                    <p class="text-sm text-gray-500 mb-1">최근 학습일: ${wordbook.lastStudied}</p>
                    <p class="text-gray-600 mb-4">총 ${wordbook.totalWords}개 단어 · ${wordbook.completedWords}개 완료</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${percentage}%; background-color:${barColor};"></div>
                    </div>
                    <p class="text-right text-sm text-gray-500 mt-2">${percentage}% 완료</p>
                `;
                flashcardWordbookList.appendChild(card);
            }
            showSection(flashcardListSection);
        }

        // 플래시카드 선택
        function selectFlashcard(element) {
            const wordbook = wordbooks[element.dataset.wordbookId];
            if (!wordbook || wordbook.words.length === 0) {
                // 커스텀 메시지 박스 구현
                showCustomMessage("선택한 단어장에 플래시카드가 없습니다.");
                return;
            }
            
            currentFlashcardData = wordbook.words;
            currentFlashcardIndex = 0;
            incorrectWords = [];
            
            flashcardStudyTitle.textContent = wordbook.title;
            
            startFlashcard();
        }

        // 플래시카드 시작
        function startFlashcard() {
            renderFlashcard();
            showSection(flashcardStudySection);
        }

        // 플래시카드 렌더링
        function renderFlashcard() {
            if (currentFlashcardIndex >= currentFlashcardData.length) {
                renderCompleteScreen();
                return;
            }

            const word = currentFlashcardData[currentFlashcardIndex];
            
            flashcardStudyCount.textContent = `${currentFlashcardIndex + 1}/${currentFlashcardData.length}`;
            flashcardWord.textContent = word.word;
            document.getElementById('back-meaning').textContent = word.meaning;
            document.getElementById('back-synonyms').textContent = word.synonyms;
            document.getElementById('back-antonyms').textContent = word.antonyms;
            document.getElementById('back-example').textContent = word.example;

            flashcardInner.classList.remove('is-flipped');
            completionButtons.classList.add('hidden');
        }

        // 플래시카드 뒤집기
        flashcardInner.addEventListener('click', () => {
            flashcardInner.classList.toggle('is-flipped');
            if (flashcardInner.classList.contains('is-flipped')) {
                completionButtons.classList.remove('hidden');
            } else {
                completionButtons.classList.add('hidden');
            }
        });

        // 정답으로 표시
        function markAsCorrect() {
            currentFlashcardIndex++;
            renderFlashcard();
        }

        // 오답으로 표시
        function markAsIncorrect() {
            incorrectWords.push(currentFlashcardData[currentFlashcardIndex]);
            currentFlashcardIndex++;
            renderFlashcard();
        }

        // 플래시카드 완료 화면 렌더링
        function renderCompleteScreen() {
            flashcardCompleteTitle.textContent = flashcardStudyTitle.textContent;
            flashcardCompleteCount.textContent = `${currentFlashcardData.length}/${currentFlashcardData.length}`;
            
            if (incorrectWords.length > 0) {
                incorrectWordsSection.classList.remove('hidden');
                incorrectWordsList.innerHTML = '';
                incorrectWords.forEach(word => {
                    const card = document.createElement('div');
                    card.className = 'word-card';
                    card.innerHTML = `
                        <h3 class="text-xl font-bold text-gray-800">${word.word}</h3>
                        <p class="meaning text-gray-700 mt-2">뜻: ${word.meaning}</p>
                    `;
                    incorrectWordsList.appendChild(card);
                });
            } else {
                incorrectWordsSection.classList.add('hidden');
            }
            showSection(flashcardCompleteSection);
        }

        // 플래시카드 다시 시작
        function restartFlashcard() {
            currentFlashcardIndex = 0;
            incorrectWords = [];
            startFlashcard();
        }

        // 퀴즈 목록으로 돌아가기
        function showFlashcardList() {
            renderWordbookList();
        }
        
        // 페이지 로드 시 초기 렌더링
        window.onload = renderWordbookList;
    </script>
</body>
</html>
