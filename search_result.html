<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>검색 결과</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #e0e0e0;
    }

    nav {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      background-color: #fff;
      display: flex;
      justify-content: center;
    }
    nav a {
      margin-right: 10px;
      cursor: pointer;
      text-decoration: underline;
      color: black;
    }
    nav a:nth-child(2),
    nav a:nth-child(3),
    .user-menu {
      margin-left: 15px;
    }

    .user-menu {
      position: relative;
      display: inline-block;
    }
    .user-dropdown {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
      top: 25px;
      right: 0;
      border-radius: 6px;
    }
    .user-dropdown a {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }
    .user-dropdown a:hover {
      background-color: #ddd;
    }
    .user-menu:hover .user-dropdown {
      display: block;
    }

    .center-box {
      padding: 30px;
      font-size: 20px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <nav>
    <a onclick="location.href='mainpage.html'">홈</a>
    <a onclick="location.href='study_note.html'">어휘 학습</a>
    <a onclick="location.href='study_tools.html'">학습 도구</a>
    <div id="authContainer"></div>
  </nav>

  <div class="center-box" id="resultBox">
    검색어를 불러오는 중...
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc
    } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXc7qF3lz2dbWOu1O3ftSNu8dye1RLk3E",
      authDomain: "auto-dictionary-29936.firebaseapp.com",
      projectId: "auto-dictionary-29936",
      storageBucket: "auto-dictionary-29936.appspot.com",
      messagingSenderId: "103494421267",
      appId: "1:103494421267:web:6762683fac5ac130e468e6",
      measurementId: "G-EKSJXHHRYS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore();
    const auth = getAuth();
    const provider = new GoogleAuthProvider();
    const authContainer = document.getElementById("authContainer");

    function login() {
      signInWithPopup(auth, provider).then((result) => {
        console.log("로그인 성공:", result.user.displayName);
      }).catch((error) => {
        console.error("로그인 실패:", error);
      });
    }

    function logout() {
      signOut(auth).then(() => {
        console.log("로그아웃 완료");
      }).catch((error) => {
        console.error("로그아웃 실패:", error);
      });
    }

    function updateAuthUI(user) {
      authContainer.innerHTML = '';
      if (user) {
        const name = user.displayName ? (user.displayName.length>8 ? user.displayName.slice(0,8)+'…' : user.displayName) : (user.email || '사용자');
        authContainer.innerHTML = `
          <div class="user-menu">
            <a href="javascript:void(0);" style="text-decoration:none">
              <span class="user-label">${name}</span>
              <img src="${user.photoURL || ''}" alt="사용자" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-left:6px;"/>
            </a>
            <div class="user-dropdown">
              <a href="#">${user.email}</a>
              <a href="statistics.html">통계</a>
              <a href="#" id="logoutBtn">로그아웃</a>
            </div>
          </div>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
      } else {
        authContainer.innerHTML = `<button id="loginBtn">로그인</button>`;
        document.getElementById('loginBtn')?.addEventListener('click', login);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      updateAuthUI(user);
      const params = new URLSearchParams(window.location.search);
      const word = params.get("word")?.toLowerCase();
      const resultBox = document.getElementById("resultBox");
      if (!word) {
        resultBox.innerText = "검색어가 없습니다.";
        return;
      }

      if (!/^[a-zA-Z]+$/.test(word)) {
        resultBox.innerText = "⚠️ 영어 단어만 검색 가능합니다.";
        return;
      }

      // Firestore에서 단어 검색
      const dictRef = doc(db, "dictionary", word);
      const dictSnap = await getDoc(dictRef);
      let meaning = [], synonyms = [], antonyms = [], examples = [];

      if (dictSnap.exists()) {
        const data = dictSnap.data();
        meaning = data.korean_translations || [];
        synonyms = data.synonyms || [];
        antonyms = data.antonyms || [];
        examples = data.examples || [];
      } else {
        // 없으면 OpenAI 호출
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "API KEY"
          },
          body: JSON.stringify({
            model: "gpt-4.1-nano",
            messages: [
              { role: "system", content: "You are a helpful assistant. Please respond in Korean." },
              { role: "user", content: `${word} 의 뜻 알려줘(1. ??  이런식으로, 앞뒤 설명없이 뜻만, 만약 일반적으로 존재하지 않는 단어면 'X' 한글자만 출력해줘)` }
            ]
          })
        });
        
        const data = await response.json();
        const rawText = data.choices?.[0]?.message?.content || "";

        if (rawText.replace(/\\s/g, '') === 'X') {
          resultBox.innerText = "검색 결과 없음";
          return;
        }

      meaning = rawText
        .split(/\n\d+\.\s*/)   
        .map(line => line.replace(/^\d+\.\s*/, "").trim())  
        .filter(line => line);
      }

      // Firestore 기록 저장 (로그인한 경우만)
      if (user) {
        const historyRef = doc(db, "users", user.email, "searchHistory", word);
        const snap = await getDoc(historyRef);
        const now = new Date().toISOString();
        const count = snap.exists() ? (snap.data().count || 1) + 1 : 1;

        await setDoc(historyRef, {
          word,
          meaning,
          synonyms,
          antonyms,
          examples,
          searchedAt: now,
          count
        });
      }

      // 결과 출력
      resultBox.innerText =
        `검색단어 : ${word}\n` +
        `뜻 : ${meaning.join(", ") || ""}\n` +
        `유의어 : ${synonyms.join(", ") || ""}\n` +
        `반의어 : ${antonyms.join(", ") || ""}\n` +
        `예문 : ${examples.slice(0, 2).join("\n") || ""}`;
    });
  </script>
</body>
</html>
