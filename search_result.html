<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>검색 결과</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #e0e0e0;
    }
    nav {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      background-color: #fff;
      display: flex;
      justify-content: center;
    }
    nav a {
      margin-right: 10px;
      cursor: pointer;
      text-decoration: underline;
      color: black;
    }
    nav a:nth-child(2),
    nav a:nth-child(3),
    .user-menu {
      margin-left: 15px;
    }
    .user-menu {
      position: relative;
      display: inline-block;
    }
    .user-dropdown {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
      top: 25px;
      right: 0;
      border-radius: 6px;
    }
    .user-dropdown a {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }
    .user-dropdown a:hover {
      background-color: #ddd;
    }
    .user-menu:hover .user-dropdown {
      display: block;
    }
    .search-container {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .search-wrapper {
      position: relative;
      width: 500px;
    }
    .search-box {
      width: 100%;
      height: 60px;
      padding: 0 45px 0 15px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
    }
    .search-box:focus {
      box-shadow: 0 0 5px rgba(66, 133, 244, 0.6);
      border-color: #4285f4;
    }
    .search-button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #666;
    }
    .result-box {
      margin-top: 40px;
      text-align: center;
      font-size: 18px;
      color: #222;
    }
    .result-box h2 {
      font-size: 28px;
      text-decoration: underline;
      margin-bottom: 30px;
    }
    .result-box .line {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin: 10px 0;
      font-size: 18px;
    }
    .result-box .line strong {
      width: 80px;
      text-align: right;
    }
    .result-box .line .bar {
      margin: 0 10px;
    }
    .result-box .line .content {
      text-align: left;
    }
  </style>
</head>
<body>
  <nav>
    <a onclick="location.href='mainpage.html'">홈</a>
    <a onclick="location.href='study_note.html'">어휘 학습</a>
    <a onclick="location.href='study_tools.html'">학습 도구</a>
    <div id="authContainer"></div>
  </nav>

  <div class="search-container">
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-box" placeholder="검색어를 입력하세요" autocomplete="off">
      <button class="search-button" id="searchBtn">
        <i class="fas fa-search"></i>
      </button>
    </div>
  </div>

  <div class="result-box" id="resultBox">
    <h2 id="resultWord">검색 단어</h2>
    <div class="line"><strong>뜻</strong><span class="bar">│</span><span class="content" id="meaningBox">뜻 내용이 여기에 들어갑니다.</span></div>
    <div class="line"><strong>유의어</strong><span class="bar">│</span><span class="content" id="synonymBox">유의어1, 유의어2</span></div>
    <div class="line"><strong>반의어</strong><span class="bar">│</span><span class="content" id="antonymBox">반의어1, 반의어2</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXc7qF3lz2dbWOu1O3ftSNu8dye1RLk3E",
      authDomain: "auto-dictionary-29936.firebaseapp.com",
      projectId: "auto-dictionary-29936",
      storageBucket: "auto-dictionary-29936.appspot.com",
      messagingSenderId: "103494421267",
      appId: "1:103494421267:web:6762683fac5ac130e468e6",
      measurementId: "G-EKSJXHHRYS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore();
    const auth = getAuth();
    const provider = new GoogleAuthProvider();
    const authContainer = document.getElementById("authContainer");

    function login() {
      signInWithPopup(auth, provider).then((result) => {
        console.log("로그인 성공:", result.user.displayName);
      }).catch((error) => {
        console.error("로그인 실패:", error);
      });
    }

    function logout() {
      signOut(auth).then(() => {
        console.log("로그아웃 완료");
      }).catch((error) => {
        console.error("로그아웃 실패:", error);
      });
    }

    function updateAuthUI(user) {
      authContainer.innerHTML = "";
      if (user) {
        const name = user.displayName.length > 5 ? user.displayName.slice(0, 5) : user.displayName;
        authContainer.innerHTML = `
          <div class="user-menu">
            <a href="javascript:void(0);" style="text-decoration: none">
              <span class="user-label">${name}</span>
              <img src="${user.photoURL}" alt="사용자" style="width: 24px; height: 24px; border-radius: 50%; vertical-align: middle;" />
            </a>
            <div class="user-dropdown">
              <a href="#">사용자 정보</a>
              <a href="statistics.html">통계</a>
              <a href="#" id="logoutBtn">로그아웃</a>
            </div>
          </div>
        `;
        document.getElementById("logoutBtn").addEventListener("click", logout);
      } else {
        authContainer.innerHTML = `<button id="loginBtn">로그인</button>`;
        document.getElementById("loginBtn").addEventListener("click", login);
      }
    }

    const input = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    search();
  }
});

searchBtn.addEventListener("click", function() {
  search();
});

function search() {
  const query = input.value.trim();
  if (query) {
    goToResult(query);
  }
}

function goToResult(query) {
  location.href = `search_result.html?word=${encodeURIComponent(query)}`;
}

onAuthStateChanged(auth, async (user) => {
      updateAuthUI(user);

      const params = new URLSearchParams(window.location.search);
      const word = params.get("word")?.toLowerCase();
      if (!word) return;
      if (!/^[a-zA-Z]+$/.test(word)) return;

      const resultWord = document.getElementById("resultWord");
      const meaningBox = document.getElementById("meaningBox");
      const synonymBox = document.getElementById("synonymBox");
      const antonymBox = document.getElementById("antonymBox");

      let meaning = [], synonyms = [], antonyms = [], examples = [];
      const dictRef = doc(db, "dictionary", word);
      const dictSnap = await getDoc(dictRef);

      if (dictSnap.exists()) {
        const data = dictSnap.data();
        meaning = data.korean_translations || [];
        synonyms = data.synonyms || [];
        antonyms = data.antonyms || [];
        examples = data.examples || [];
      } else {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer [YOUR_API_KEY]"
          },
          body: JSON.stringify({
            model: "gpt-4.1-nano",
            messages: [
              { role: "system", content: "You are a helpful assistant. Please respond in Korean." },
              { role: "user", content: `${word} 의 뜻 알려줘(1. ??  이런식으로, 앞뒤 설명없이 뜻만, 만약 일반적으로 존재하지 않는 단어면 'X' 한글자만 출력해줘)` }
            ]
          })
        });

        const data = await response.json();
        const rawText = data.choices?.[0]?.message?.content || "";
        if (rawText.replace(/\s/g, '') === 'X') {
          resultWord.innerText = word;
          meaningBox.innerText = '검색 결과 없음';
          synonymBox.innerText = '-';
          antonymBox.innerText = '-';
          return; 
        }


        meaning = rawText
          .split(/\n\d+\.\s*/)
          .map(line => line.replace(/^\d+\.\s*/, "").trim())
          .filter(line => line);
      }

      resultWord.innerText = word;
      meaningBox.innerText = meaning.join(", ") || "-";
      synonymBox.innerText = synonyms.join(", ") || "-";
      antonymBox.innerText = antonyms.join(", ") || "-";

      if (user && meaning.length > 0) {
        const historyRef = doc(db, "users", user.email, "searchHistory", word);
        const snap = await getDoc(historyRef);
        const now = new Date().toISOString();
        const count = snap.exists() ? (snap.data().count || 1) + 1 : 1;

        await setDoc(historyRef, {
          word,
          meaning,
          synonyms,
          antonyms,
          examples,
          searchedAt: now,
          count
        });
      }

    });
  </script>
</body>
</html>
